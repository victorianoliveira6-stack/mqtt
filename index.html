<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Central de Iluminação IoT</title>
  <!-- Paho MQTT via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <style>
    /* reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #d4eaff 0%, #f0f9ff 100%);
      padding: 1.5rem;
      margin: 0;
    }

    /* card principal - glassmorphism */
    .glass-card {
      max-width: 680px;
      width: 100%;
      background: rgba(255, 255, 255, 0.48);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border-radius: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 20px 40px -12px rgba(0, 20, 40, 0.25), 0 8px 24px -6px rgba(0, 40, 80, 0.08);
      padding: 2rem 2.2rem;
      transition: all 0.25s ease;
    }

    @media (max-width: 480px) {
      .glass-card {
        padding: 1.6rem 1.2rem;
        border-radius: 2rem;
      }
    }

    /* cabeçalho */
    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.8rem;
    }

    .title-group {
      display: flex;
      flex-direction: column;
    }

    .title-main {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #0b2b44;
      line-height: 1.2;
    }

    .title-sub {
      font-size: 0.9rem;
      font-weight: 400;
      color: #3d5a73;
      opacity: 0.8;
      margin-top: 0.1rem;
      letter-spacing: 0.2px;
    }

    /* pill de status */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 0.45rem 1.1rem 0.45rem 0.9rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
      font-size: 0.85rem;
      font-weight: 500;
      color: #1e2f3f;
      transition: all 0.2s;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fbbf24; /* amarelo padrão */
      box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2);
      transition: background 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }

    .status-dot.online {
      background: #10b981;
      box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.3), 0 0 12px #10b98166;
    }

    .status-dot.offline {
      background: #ef4444;
      box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.3);
    }

    .status-dot.sync {
      background: #fbbf24;
      animation: pulse-dot 1.2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0% { opacity: 0.6; transform: scale(0.95); box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2); }
      50% { opacity: 1; transform: scale(1.1); box-shadow: 0 0 0 6px rgba(251, 191, 36, 0.1); }
      100% { opacity: 0.6; transform: scale(0.95); box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2); }
    }

    .status-text {
      white-space: nowrap;
    }

    /* tópico */
    .topic-area {
      margin: 1.2rem 0 1.8rem 0;
    }

    .topic-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #2c4b66;
      opacity: 0.7;
      margin-bottom: 0.4rem;
    }

    .topic-input {
      width: 100%;
      padding: 0.8rem 1.2rem;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 60px;
      font-size: 0.95rem;
      font-weight: 450;
      color: #0b2b44;
      outline: none;
      transition: all 0.2s;
      box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.01);
    }

    .topic-input:focus {
      border-color: #7aa9d9;
      background: rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 0 4px rgba(58, 130, 200, 0.08);
    }

    /* LED preview */
    .led-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.8rem 0 1.2rem 0;
    }

    .led-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: #cbdde9; /* cinza azulado inativo */
      box-shadow: inset 0 6px 12px rgba(0,0,0,0.02), 0 4px 12px rgba(0,0,0,0.02);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.2), box-shadow 0.5s ease, transform 0.2s;
      color: #2e4a62;
      font-size: 0.9rem;
      font-weight: 450;
      letter-spacing: 0.3px;
      text-align: center;
      padding: 0 0.8rem;
      will-change: transform;
    }

    .led-circle.active {
      background: #0088ff; /* azul neon */
      box-shadow: 0 0 30px #0088ffaa, 0 0 60px #0088ff66, 0 0 100px #0088ff33, inset 0 -4px 12px rgba(255,255,255,0.2);
      color: white;
      text-shadow: 0 2px 12px rgba(0,0,0,0.1);
      animation: glow-pulse 2.2s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0% { box-shadow: 0 0 30px #0088ffaa, 0 0 60px #0088ff55, 0 0 100px #0088ff22; }
      50% { box-shadow: 0 0 40px #0088ffdd, 0 0 80px #0088ff88, 0 0 120px #0088ff44; }
      100% { box-shadow: 0 0 30px #0088ffaa, 0 0 60px #0088ff55, 0 0 100px #0088ff22; }
    }

    .led-circle.inactive {
      background: #cbdde9;
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.02), 0 4px 12px rgba(0,0,0,0.02);
      color: #3a5a72;
    }

    /* botoes */
    .actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.8rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      flex: 1 1 140px;
      min-width: 120px;
      padding: 0.9rem 0.8rem;
      border: none;
      border-radius: 60px;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.4px;
      color: white;
      background: #b0c9dd;
      box-shadow: 0 6px 16px rgba(0, 20, 40, 0.04);
      transition: all 0.2s ease;
      cursor: default;
      opacity: 0.5;
      transform: scale(0.98);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .btn.enabled {
      cursor: pointer;
      opacity: 1;
      transform: scale(1);
      box-shadow: 0 8px 24px rgba(0, 40, 80, 0.08);
    }

    .btn.enabled:active {
      transform: scale(0.94);
    }

    .btn-on {
      background: #2d8f6f; /* verde esmeralda suave */
      border-color: #6bbaa0;
    }

    .btn-on.enabled:hover {
      background: #1f7a5d;
      box-shadow: 0 8px 24px #2d8f6f44;
    }

    .btn-off {
      background: #bf7a7a; /* coral suave */
      border-color: #dba8a8;
    }

    .btn-off.enabled:hover {
      background: #ac6363;
      box-shadow: 0 8px 24px #bf7a7a44;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: scale(0.96);
    }

    /* pequenos ajustes */
    .flex-spacer {
      flex: 1;
    }

    .text-muted {
      color: #4b6d88;
      font-weight: 400;
    }

    /* responsividade */
    @media (max-width: 500px) {
      .title-main {
        font-size: 1.5rem;
      }
      .status-pill {
        font-size: 0.75rem;
        padding: 0.3rem 0.9rem 0.3rem 0.7rem;
      }
      .led-circle {
        width: 110px;
        height: 110px;
        font-size: 0.8rem;
      }
      .btn {
        font-size: 1rem;
        padding: 0.8rem 0.4rem;
        min-width: 100px;
      }
    }
  </style>
</head>
<body>

<div class="glass-card">
  
  <!-- cabeçalho -->
  <div class="header">
    <div class="title-group">
      <span class="title-main">💡 Central de Iluminação</span>
      <span class="title-sub">Controle de Hardware · Porta 13</span>
    </div>
    <div class="status-pill" id="statusPill">
      <span class="status-dot sync" id="statusDot"></span>
      <span class="status-text" id="statusText">Sincronizando...</span>
    </div>
  </div>

  <!-- tópico -->
  <div class="topic-area">
    <label class="topic-label" for="topicInput">📡 Tópico MQTT</label>
    <input class="topic-input" id="topicInput" type="text" value="gerry_sanchez_led_exclusivo/arduino" spellcheck="false">
  </div>

  <!-- LED preview -->
  <div class="led-preview">
    <div class="led-circle inactive" id="ledCircle">Dispositivo Inativo</div>
  </div>

  <!-- ações -->
  <div class="actions">
    <button class="btn btn-on" id="btnOn" disabled>🔛 LIGAR</button>
    <button class="btn btn-off" id="btnOff" disabled>⏻ DESLIGAR</button>
  </div>
  <div style="margin-top: 1rem; text-align: center; font-size: 0.7rem; color: #6a8aa3; opacity: 0.5; letter-spacing: 0.3px;">
    <span>atualização via MQTT · broker.hivemq.com</span>
  </div>
</div>

<script>
  (function() {
    // --- DOM refs ---
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const ledCircle = document.getElementById('ledCircle');
    const btnOn = document.getElementById('btnOn');
    const btnOff = document.getElementById('btnOff');
    const topicInput = document.getElementById('topicInput');

    // --- estado interno ---
    let currentTopic = topicInput.value.trim();
    let client = null;
    let isConnected = false;
    let ledState = 0; // 0 = off, 1 = on

    // --- helpers UI ---
    function setStatus(mode, msg) {
      // mode: 'sync', 'online', 'offline'
      statusDot.className = 'status-dot';
      if (mode === 'sync') {
        statusDot.classList.add('sync');
        statusText.textContent = msg || 'Sincronizando...';
      } else if (mode === 'online') {
        statusDot.classList.add('online');
        statusText.textContent = msg || 'Sistema Online';
      } else if (mode === 'offline') {
        statusDot.classList.add('offline');
        statusText.textContent = msg || 'Desconectado';
      }
    }

    function setButtonsEnabled(enabled) {
      if (enabled) {
        btnOn.disabled = false;
        btnOff.disabled = false;
        btnOn.classList.add('enabled');
        btnOff.classList.add('enabled');
      } else {
        btnOn.disabled = true;
        btnOff.disabled = true;
        btnOn.classList.remove('enabled');
        btnOff.classList.remove('enabled');
      }
    }

    function updateLedUI(state) {
      if (state === 1) {
        ledCircle.className = 'led-circle active';
        ledCircle.textContent = 'Dispositivo Ativo';
      } else {
        ledCircle.className = 'led-circle inactive';
        ledCircle.textContent = 'Dispositivo Inativo';
      }
    }

    // --- MQTT lógica ---
    function connectMqtt() {
      if (client) {
        try { client.disconnect(); } catch (_) {}
        client = null;
      }

      const clientId = 'web_' + Math.random().toString(16).substring(2, 10) + '_' + Date.now().toString(36);
      const broker = 'broker.hivemq.com';
      const port = 8884;
      
      client = new Paho.MQTT.Client(broker, port, clientId);
      client.useSSL = true;

      const onConnect = () => {
        isConnected = true;
        setStatus('online', 'Sistema Online');
        setButtonsEnabled(true);
        // inscreve no tópico atual
        const topic = currentTopic;
        if (topic && topic.length > 0) {
          client.subscribe(topic, { qos: 0 });
          console.log('[MQTT] inscrito em:', topic);
        }
        // publica um status inicial? não obrigatório
      };

      const onFailure = (err) => {
        isConnected = false;
        setStatus('offline', 'Falha na conexão');
        setButtonsEnabled(false);
        console.warn('[MQTT] erro conexão:', err);
        // tenta reconectar após 5s
        setTimeout(() => {
          if (!isConnected) {
            connectMqtt();
          }
        }, 5000);
      };

      const onMessageArrived = (message) => {
        const payload = message.payloadString.trim();
        const topic = message.destinationName;
        console.log(`[MQTT] mensagem em ${topic}:`, payload);

        // só atualiza se for o tópico atual
        if (topic === currentTopic) {
          if (payload === '1') {
            ledState = 1;
            updateLedUI(1);
          } else if (payload === '0') {
            ledState = 0;
            updateLedUI(0);
          } else {
            // ignora outros valores
          }
        }
      };

      client.onConnectionLost = (response) => {
        isConnected = false;
        setStatus('offline', 'Conexão perdida');
        setButtonsEnabled(false);
        console.warn('[MQTT] conexão perdida', response);
        // tenta reconectar
        setTimeout(() => {
          if (!isConnected) {
            connectMqtt();
          }
        }, 4000);
      };

      client.onMessageArrived = onMessageArrived;

      const options = {
        timeout: 10,
        onSuccess: onConnect,
        onFailure: onFailure,
        useSSL: true,
      };

      client.connect(options);
    }

    // --- desinscrever e assinar novo tópico ---
    function switchTopic(newTopic) {
      if (!client || !isConnected) return;
      if (!newTopic || newTopic.length === 0) return;

      // desinscreve do antigo se existir
      const oldTopic = currentTopic;
      if (oldTopic && oldTopic.length > 0 && oldTopic !== newTopic) {
        try {
          client.unsubscribe(oldTopic, { qos: 0 });
          console.log('[MQTT] desinscrito de:', oldTopic);
        } catch (e) {
          console.warn('[MQTT] erro ao desinscrever', e);
        }
      }

      // inscreve no novo
      try {
        client.subscribe(newTopic, { qos: 0 });
        console.log('[MQTT] inscrito em:', newTopic);
        currentTopic = newTopic;
        // Não muda estado do LED, apenas aguarda mensagem
      } catch (e) {
        console.warn('[MQTT] erro ao inscrever', e);
      }
    }

    // --- publicar comando ---
    function publishCommand(value) {
      if (!client || !isConnected) {
        console.warn('[MQTT] não conectado');
        return;
      }
      const topic = currentTopic;
      if (!topic || topic.length === 0) {
        console.warn('[MQTT] tópico inválido');
        return;
      }
      const msg = new Paho.MQTT.Message(String(value));
      msg.destinationName = topic;
      msg.qos = 0;
      client.send(msg);
      console.log(`[MQTT] publicado '${value}' em ${topic}`);
    }

    // --- eventos UI ---
    function handleTopicChange() {
      const newTopic = topicInput.value.trim();
      if (newTopic === currentTopic) return;
      if (newTopic.length === 0) return;
      // se conectado, faz a troca
      if (isConnected && client) {
        switchTopic(newTopic);
      } else {
        // apenas atualiza a referência para quando conectar
        currentTopic = newTopic;
      }
    }

    // --- inicialização e eventos ---
    function init() {
      // seta estado inicial
      setStatus('sync', 'Sincronizando...');
      setButtonsEnabled(false);
      updateLedUI(0);
      ledState = 0;

      // conecta MQTT
      connectMqtt();

      // eventos dos botões
      btnOn.addEventListener('click', function(e) {
        if (!isConnected) return;
        publishCommand('1');
        // NÃO altera o LED localmente
      });

      btnOff.addEventListener('click', function(e) {
        if (!isConnected) return;
        publishCommand('0');
        // NÃO altera o LED localmente
      });

      // evento de mudança no tópico (com debounce)
      let topicTimeout = null;
      topicInput.addEventListener('input', function() {
        clearTimeout(topicTimeout);
        topicTimeout = setTimeout(() => {
          handleTopicChange();
        }, 400);
      });

      // se perder o foco, aplica imediatamente
      topicInput.addEventListener('blur', function() {
        clearTimeout(topicTimeout);
        handleTopicChange();
      });

      // reconexão manual caso precise (ex: botão oculto?)
      // mas já temos reconexão automática
    }

    // inicia
    init();

    // expor para debug (opcional)
    window.__iot = { client, connectMqtt, publishCommand, currentTopic };
  })();
</script>
</body>
</html>
